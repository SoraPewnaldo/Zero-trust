
services:
  # -------------------------
  # Frontend (Vite/React)
  # -------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroiam-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - BACKEND_URL=http://backend:3001
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - dev-network
    depends_on:
      backend:
        condition: service_healthy

  # -------------------------
  # Backend (Node/Express)
  # -------------------------
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zeroiam-backend-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/zeroiam_dev
      - PORT=3001
      - CORS_ORIGIN=http://localhost:5173
      - JWT_SECRET=dev_secret_key_change_in_prod
      - JWT_EXPIRES_IN=8h
      - TRUST_ENGINE_URL=http://trust_engine:5000/scan
      - TRUST_ENGINE_TIMEOUT=8000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------
  # Trust Engine (Python/Flask)
  # -------------------------
  trust_engine:
    build:
      context: ./trust_engine
      dockerfile: Dockerfile
    container_name: zeroiam-trust-engine-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./trust_engine:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - WINDOWS_AGENT_URL=http://host.docker.internal:5001/status
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # -------------------------
  # Database (MongoDB)
  # -------------------------
  mongodb:
    image: mongo:7.0
    container_name: zeroiam-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - dev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  dev-network:
    driver: bridge

volumes:
  mongodb_dev_data:
