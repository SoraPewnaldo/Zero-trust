# ============================================================
# ZeroIAM — Nginx Server Block
#
# HTTP-only mode (works immediately with an IP address).
# To enable HTTPS: see comments at the bottom of this file.
# ============================================================

# ── Upstream: Backend API ───────────────────────────────────
upstream backend_api {
    server backend:3001;
    keepalive 32;
}

# ── HTTP Server ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;        # matches any hostname or bare IP

    # ── Certbot ACME challenge (for SSL — ignored in HTTP mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API Proxy → Backend Node.js ─────────────────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts — Trust Engine scan can take ~5s
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Forward errors cleanly
        proxy_intercept_errors off;
    }

    # ── Health Check endpoint ────────────────────────────────
    location /health {
        proxy_pass http://backend_api/health;
        access_log off;
    }

    # ── Static Frontend (SPA) ────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # React Router: always serve index.html for unknown paths
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Don't cache the HTML entry point
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Block common attack paths ────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

