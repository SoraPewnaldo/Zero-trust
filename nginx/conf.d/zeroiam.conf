# ============================================================
# ZeroIAM — Nginx Server Block (HTTPS)
# ============================================================

# ── Upstream: Backend API ───────────────────────────────────
upstream backend_api {
    server backend:3001;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sorapew.tech www.sorapew.tech;

    # Allow Certbot to verify domain via HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sorapew.tech www.sorapew.tech;

    ssl_certificate     /etc/letsencrypt/live/sorapew.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sorapew.tech/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/sorapew.tech/chain.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (comment out until SSL is confirmed working)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── API Proxy → Backend Node.js ─────────────────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_intercept_errors off;
    }

    # ── Health Check endpoint ────────────────────────────────
    location /health {
        proxy_pass http://backend_api/health;
        access_log off;
    }

    # ── Static Frontend (SPA) ────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Block common attack paths ────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
