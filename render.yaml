services:
  # -------------------------
  # Backend (Node/Express)
  # -------------------------
  - type: web
    name: zeroiam-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false   # Set this manually in Render Dashboard → Environment
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: TRUST_ENGINE_URL
        sync: false   # Set to your trust engine URL after deploy
      - key: TRUST_ENGINE_TIMEOUT
        value: 35000
      - key: CORS_ORIGIN
        sync: false   # Set to your Vercel frontend URL after deploy

  # -------------------------
  # Trust Engine (Python/Flask)
  # -------------------------
  - type: web
    name: zeroiam-trust-engine
    runtime: python
    rootDir: trust_engine
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEMO_MODE
        value: true
